workflows:
  vpn-manager-ipa:
    name: VPN Manager IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Show Xcode version
        script: xcodebuild -version

      - name: Build Archive
        script: |
          xcodebuild archive \
            -project VPNManager/VPNManager.xcodeproj \
            -scheme VPNManager \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/VPNManager.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_SERIALIZE_DEBUGGING_OPTIONS=NO \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Prepare clean IPA for Feather
        script: |
          # Find the built .app
          APP_PATH=$(find "$CM_BUILD_DIR/VPNManager.xcarchive" -name "*.app" | head -1)
          echo "App found at: $APP_PATH"

          # Copy to Payload folder
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/VPNManager.app"

          APP="$CM_BUILD_DIR/Payload/VPNManager.app"

          # Remove embedded provisioning profile (not needed, Feather adds its own)
          rm -f "$APP/embedded.mobileprovision"

          # Strip ALL existing code signatures from the main binary
          BINARY="$APP/VPNManager"
          echo "Stripping signatures from binary..."
          codesign --remove-signature "$BINARY" || true

          # Remove _CodeSignature folder entirely so Feather starts clean
          rm -rf "$APP/_CodeSignature"

          # Re-apply minimal ad-hoc signature so the binary is valid Mach-O
          codesign -f -s "-" "$BINARY" || true

          # Package as IPA
          cd "$CM_BUILD_DIR"
          zip -qr VPNManager.ipa Payload/
          echo "Final IPA size: $(du -sh VPNManager.ipa | cut -f1)"
          echo "Done — IPA ready for Feather"

    artifacts:
      - $CM_BUILD_DIR/VPNManager.ipa
