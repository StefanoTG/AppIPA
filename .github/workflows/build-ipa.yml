name: Build VPN Manager IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Archive (no code signing)
        run: |
          xcodebuild archive \
            -project VPNManager/VPNManager.xcodeproj \
            -scheme VPNManager \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/VPNManager.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA from archive
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/VPNManager.xcarchive" -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/VPNManager.app"

          cd "$RUNNER_TEMP"
          zip -r "VPNManager.ipa" "Payload/"
          echo "IPA created: $(du -sh VPNManager.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPNManager-IPA
          path: ${{ runner.temp }}/VPNManager.ipa
          retention-days: 30
